<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Aniversário - 26/04</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rosa-claro: #fff0f5; /* Lavender Blush */
            --rosa-detalhe: #ffb6c1; /* Light Pink */
            --rosa-texto: #db7093; /* Pale Violet Red */
            --branco: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--rosa-claro);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #4a4a4a;
            position: relative;
            overflow: hidden; /* Importante para os balões sumirem no topo */
        }

        /* --- Estilos para os Balões Subindo --- */
        .balao {
            position: absolute;
            z-index: 1; /* Atrás do card */
            opacity: 0.7;
            pointer-events: none; /* Não atrapalha cliques */
            width: 80px; /* Tamanho do balão, ajuste se necessário */
            height: auto;
            
            /* Define a animação: nome, duração, tipo, repetição */
            animation: subir 15s linear infinite;
            
            /* Começa abaixo da tela */
            bottom: -150px; 
        }

        /* Define a animação de subir */
        @keyframes subir {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0; /* Começa invisível */
            }
            10% {
                opacity: 0.7; /* Fica visível logo após começar */
            }
            90% {
                opacity: 0.7; /* Começa a sumir no final */
            }
            100% {
                /* Sobe até passar o topo da tela */
                transform: translateY(-120vh) rotate(10deg);
                opacity: 0; /* Termina invisível */
            }
        }

        /* Posicionamento horizontal e atrasos diferentes para cada balão */
        .balao-1 { left: 10%; animation-delay: 0s; width: 90px; }
        .balao-2 { left: 30%; animation-delay: 4s; width: 70px; animation-duration: 18s; }
        .balao-3 { left: 55%; animation-delay: 8s; width: 85px; animation-duration: 12s; }
        .balao-4 { left: 80%; animation-delay: 2s; width: 75px; animation-duration: 20s; }
        .balao-5 { left: 90%; animation-delay: 10s; width: 65px; }

        /* --- Estilo do Card (Preservado) --- */
        .card {
            background: var(--branco);
            width: 90%;
            max-width: 450px;
            padding: 35px 25px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(219, 112, 147, 0.15);
            text-align: center;
            border: 1px solid var(--rosa-detalhe);
            position: relative;
            z-index: 10; /* Card acima de tudo */
        }

        .card::before { content: '🎈'; position: absolute; top: -15px; left: 20px; font-size: 2rem; }
        .card::after { content: '✨'; position: absolute; top: -15px; right: 20px; font-size: 2rem; }

        h1 { font-family: 'Dancing Script', cursive; color: var(--rosa-texto); font-size: 2.8rem; margin: 10px 0; }
        .info-container { background: #fffafa; padding: 20px; border-radius: 15px; margin: 20px 0; border-left: 4px solid var(--rosa-detalhe); }
        .info-item { margin-bottom: 15px; }
        .info-item b { display: block; color: var(--rosa-texto); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .info-item span { font-size: 1.1rem; font-weight: 500; }
        .map-link { display: inline-block; margin-top: 8px; color: #5d9cec; text-decoration: none; font-size: 0.85rem; font-weight: 600; }
        .form-section { margin-top: 25px; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #eee; border-radius: 12px; background: #fdfdfd; font-family: inherit; }
        button { background: var(--rosa-texto); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .emoji-footer { margin-top: 20px; font-size: 1.2rem; opacity: 0.7; }
    </style>
</head>
<body>

    <img src="21.png" alt="Balão flutuando" class="balao balao-1">
    <img src="21.png" alt="Balão flutuando" class="balao balao-2">
    <img src="21.png" alt="Balão flutuando" class="balao balao-3">
    <img src="21.png" alt="Balão flutuando" class="balao balao-4">
    <img src="21.png" alt="Balão flutuando" class="balao balao-5">
    <div class="card">
        <h1>Meu Aniversário</h1>
        <p>Prepare o coração (e o apetite)! 🍕</p>

        <div class="info-container">
            <div class="info-item">
                <b>Quando será?</b>
                <span>26 de Abril de 2026 às 19:30</span>
            </div>
            <div class="info-item">
                <b>Onde?</b>
                <span>Divina Grill & Pizza</span>
                <p style="font-size: 0.8rem; margin: 5px 0;">St. Leste Q 22 - Gama, Brasília - DF</p>
                <a href="https://maps.app.goo.gl/hVPotUejDAKfULtcA" target="_blank" class="map-link">📍 Abrir no Google Maps</a>
            </div>
        </div>

        <div class="form-section">
            <h3 style="color: var(--rosa-texto); margin-bottom: 15px;">Confirme sua Presença</h3>
            <input type="text" id="nome" placeholder="Seu nome">
            <select id="qtd">
                <option value="1 pessoa">Vou sozinho(a)</option>
                <option value="2 pessoas">Vou com acompanhante (2 pessoas)</option>
                <option value="3+ pessoas">Família (3+ pessoas)</option>
            </select>
            <button onclick="enviarConvite()">Confirmar no WhatsApp</button>
        </div>

        <div class="emoji-footer">🎂 🥳 🎁</div>
    </div>

    <script>
        function enviarConvite() {
            const seuNumero = "5561992276709"; 
            const nome = document.getElementById('nome').value;
            const qtd = document.getElementById('qtd').value;
            if (!nome) { alert("Por favor, digite seu nome antes de confirmar."); return; }
            const texto = `Oi! Estou confirmando minha presença no seu aniversário no Divina Grill!%0A%0A*Nome:* ${nome}%0A*Quantidade:* ${qtd}`;
            window.open(`https://wa.me/${seuNumero}?text=${texto}`, '_blank');
        }
    </script>
</body>
</html>
