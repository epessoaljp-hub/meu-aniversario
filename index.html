<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Aniversário - 26/04</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rosa-claro: #fff0f5;
            --rosa-detalhe: #ffb6c1;
            --rosa-texto: #db7093;
            --branco: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--rosa-claro);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #4a4a4a;
            position: relative;
            overflow: hidden;
        }

        /* --- Animação dos Balões Subindo --- */
        .balao {
            position: absolute;
            z-index: 1;
            opacity: 0.7;
            pointer-events: none;
            width: 80px;
            height: auto;
            animation: subir 15s linear infinite;
            bottom: -200px; 
        }

        @keyframes subir {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-130vh) rotate(15deg); opacity: 0; }
        }

        /* Distribuição dos Balões na tela */
        .balao-21-1 { left: 5%; animation-delay: 0s; width: 90px; }
        .balao-21-2 { left: 25%; animation-delay: 6s; width: 70px; }
        .balao-rosa-1 { left: 45%; animation-delay: 4s; width: 80px; }
        .balao-rosa-2 { left: 85%; animation-delay: 10s; width: 95px; }
        .balao-ouro-1 { left: 65%; animation-delay: 2s; width: 75px; }

        /* --- Estilo do Card --- */
        .card {
            background: var(--branco);
            width: 90%;
            max-width: 450px;
            padding: 35px 25px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(219, 112, 147, 0.15);
            text-align: center;
            border: 1px solid var(--rosa-detalhe);
            position: relative;
            z-index: 10;
        }

        h1 { font-family: 'Dancing Script', cursive; color: var(--rosa-texto); font-size: 2.8rem; margin: 10px 0; }

        .info-container {
            background: #fffafa;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            border-left: 4px solid var(--rosa-detalhe);
            text-align: left;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid #eee;
            border-radius: 12px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }

        button {
            flex: 1;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }

        .btn-sim { background: var(--rosa-texto); }
        .btn-nao { background: #bbb; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #mensagem-final { display: none; padding: 30px 10px; }
    </style>
</head>
<body>

    <img src="21.png" class="balao balao-21-1">
    <img src="21.png" class="balao balao-21-2">
    <img src="balao-rosa.png" class="balao balao-rosa-1">
    <img src="balao-rosa.png" class="balao balao-rosa-2">
    <img src="balao-ouro.png" class="balao balao-ouro-1">

    <div class="card">
        <div id="conteudo-convite">
            <h1>Meu Aniversário</h1>
            <p>Prepare o coração (e o apetite)! 🍕</p>

            <div class="info-container">
                <b style="color: var(--rosa-texto); font-size: 0.8rem;">QUANDO?</b><br>
                <span>26 de Abril de 2026 às 19:30</span><br><br>
                <b style="color: var(--rosa-texto); font-size: 0.8rem;">ONDE?</b><br>
                <span>Divina Grill & Pizza - Gama/DF</span>
            </div>

            <div style="margin-top: 25px;">
                <h3 style="color: var(--rosa-texto);">Confirme sua Presença</h3>
                <input type="text" id="nome" placeholder="Digite seu nome completo">
                
                <select id="qtd">
                    <option value="1">Vou sozinho(a)</option>
                    <option value="2">Vou com acompanhante (2)</option>
                    <option value="3+">Família (3+ pessoas)</option>
                </select>

                <div class="btn-group">
                    <button id="btnSim" class="btn-sim" onclick="enviarDados('Sim')">Vou com certeza!</button>
                    <button id="btnNao" class="btn-nao" onclick="enviarDados('Não')">Não poderei ir</button>
                </div>
            </div>
        </div>

        <div id="mensagem-final">
            <h2 style="color: var(--rosa-texto); font-family: 'Dancing Script', cursive; font-size: 2.5rem;">Obrigado! ❤️</h2>
            <p id="msg-texto">Sua confirmação foi enviada com sucesso.</p>
            <div style="font-size: 2rem; margin-top: 15px;">🎂 ✨ 🥳</div>
        </div>
    </div>

    <script>
        function enviarDados(status) {
            const nome = document.getElementById('nome').value;
            const qtd = document.getElementById('qtd').value;
            const btnSim = document.getElementById('btnSim');
            const btnNao = document.getElementById('btnNao');

            if (!nome) {
                alert("Por favor, preencha seu nome.");
                return;
            }

            // Desabilita botões para evitar cliques duplicados
            btnSim.disabled = true;
            btnNao.disabled = true;
            btnSim.innerText = "Enviando...";

            const dados = {
                Nome: nome,
                Presenca: status,
                Quantidade: status === 'Sim' ? qtd : '0',
                _subject: `Confirmação de Aniversário: ${nome}`
            };

            // Envio via Formspree com o novo ID: xkoknqrl
            fetch("https://formspree.io/f/xkoknqrl", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Accept": "application/json" 
                },
                body: JSON.stringify(dados)
            }).then(response => {
                if (response.ok) {
                    document.getElementById('conteudo-convite').style.display = 'none';
                    document.getElementById('mensagem-final').style.display = 'block';
                    if(status === 'Não') {
                        document.getElementById('msg-texto').innerText = "Sentiremos sua falta no dia!";
                    }
                } else {
                    alert("Ocorreu um erro no servidor. Tente novamente.");
                    btnSim.disabled = false;
                    btnNao.disabled = false;
                    btnSim.innerText = "Vou com certeza!";
                }
            }).catch(error => {
                alert("Erro de conexão. Verifique sua internet.");
                btnSim.disabled = false;
                btnNao.disabled = false;
            });
        }
    </script>
</body>
</html>
